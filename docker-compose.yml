services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: paybridge-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - paybridge-network

  # Spring Boot Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paybridge-app
    depends_on:
      - postgres
    environment:
      # Database connection
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}?sslmode=disable
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # JPA/Hibernate settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

      # Stripe API keys
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # JWT secret
      JWT_SECRET: ${JWT_SECRET}

      # App name
      SPRING_APPLICATION_NAME: PayBridge

    ports:
      - "8080:8080"
    networks:
      - paybridge-network
    restart: unless-stopped

# Named volumes for persistent data
volumes:
  postgres_data:

# Custom network for services communication
networks:
  paybridge-network:
    driver: bridge

